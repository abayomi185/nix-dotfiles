# SOPS-encrypted secrets template for wifi-repeater.
#
# This file is a TEMPLATE. Before flashing, replace `hostapd_passphrase`
# with the real WPA2 passphrase for the AP, then encrypt it in place:
#
#   sops --encrypt --in-place hosts/wifi-repeater/secrets.yaml
#
# sops-nix will decrypt this file at activation using the SSH key at
# /root/.ssh/id_ed25519 on the Pi (see README for the post-flash key
# setup, matching the knode pattern).
#
# To move this to your nix-secrets repo (recommended for consistency with
# the knode hosts), copy the encrypted file there and update the
# `sops.defaultSopsFile` path in configuration.nix.
hostapd_passphrase: REPLACE_ME_WITH_REAL_WPA2_PASSPHRASE
